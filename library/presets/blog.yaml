constitution:
  principles:
    - Content is king — optimize the writing and publishing experience
    - SEO by default — every page must be search-engine friendly
    - Performance — static generation for published content
    - Accessible — semantic HTML, proper heading hierarchy, alt text
  conventions:
    - Use MDX for rich content with embedded components
    - Implement draft/publish workflow with status transitions
    - Generate static pages for published content with generateStaticParams
    - Use structured data (JSON-LD) for articles
    - Optimize images with next/image and responsive srcsets
context:
  projectDescription: >
    This is a blog or content management system. The orchestrator coordinates content model design,
    MDX integration, SEO optimization, and admin panel development to deliver a fast, SEO-friendly
    publishing platform.
