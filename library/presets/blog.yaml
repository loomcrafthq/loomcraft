name: Blog
description: Blog and CMS with content management, SEO optimization, and responsive design.
agents:
  - database
  - backend
  - frontend
  - ux-ui
  - tester
  - review-qa
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/seo-optimization
  - loomcraft/skills/cms-patterns
workflow:
  preparation:
    source: manual
  pipeline:
    - agent: database
      condition: "if migrations needed"
    - agent: tester
      mode: tdd
      scope: "database + backend"
    - agent: backend
    - agent: ux-ui
      condition: "if UI needed"
    - agent: frontend
    - agent: tester
      mode: test-after
      scope: "frontend"
  verification:
    - review-qa
    - tester
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
