name: Extension
description: Browser extension with content scripts, background workers, and security review.
agents:
  - frontend
  - backend
  - tester
  - review-qa
  - security
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/testing-patterns
  - loomcraft/skills/chrome-extension-patterns
workflow:
  preparation:
    source: linear
  pipeline:
    - agent: tester
      mode: tdd
      scope: "backend"
    - agent: backend
    - agent: frontend
    - agent: tester
      mode: test-after
      scope: "frontend"
  verification:
    - review-qa
    - tester
    - security
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
