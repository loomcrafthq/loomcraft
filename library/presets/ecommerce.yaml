constitution:
  principles:
    - Trust and conversion — secure payments and frictionless checkout
    - SEO-driven traffic — optimize every product and category page
    - Performance matters — fast page loads directly impact revenue
    - Mobile-first — majority of e-commerce traffic is mobile
  conventions:
    - Use Stripe for all payment processing
    - Implement structured data for products (JSON-LD)
    - Server Components for product pages, Client Components for cart
    - Validate all form inputs with Zod schemas
    - Use optimistic UI for cart operations
context:
  projectDescription: >
    This is an e-commerce application. The orchestrator coordinates product catalog development,
    payment integration, SEO optimization, and security audits to deliver a fast, trustworthy
    online store.
