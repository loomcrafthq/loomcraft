name: API
description: API-only backend service with security, validation, and comprehensive testing.
agents:
  - database
  - backend
  - tester
  - review-qa
  - security
skills:
  - obra/superpowers/brainstorming
  - obra/superpowers/writing-plans
  - obra/superpowers/executing-plans
  - obra/superpowers/systematic-debugging
  - obra/superpowers/requesting-code-review
  - obra/superpowers/receiving-code-review
  - github/awesome-copilot/conventional-commit
  - loomcrafthq/skills/ticket-craft
  - loomcrafthq/skills/testing-patterns
  - obra/superpowers/test-driven-development
  - supabase/agent-skills/supabase-postgres-best-practices
  - anthropics/skills/webapp-testing
workflow:
  preparation:
    source: linear
  pipeline:
    - agent: database
      condition: "if migrations needed"
    - agent: tester
      mode: tdd
      scope: "backend"
    - agent: backend
  verification:
    - review-qa
    - tester
    - security
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
