name: API
description: API-only backend service with security, validation, and comprehensive testing.
agents:
  - database
  - backend
  - tester
  - review-qa
  - security
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/linear-conventions
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/testing-patterns
  - loomcraft/skills/api-design
  - loomcraft/skills/auth-rbac
workflow:
  preparation:
    source: linear
  pipeline:
    - agent: database
      condition: "if migrations needed"
    - agent: tester
      mode: tdd
      scope: "backend"
    - agent: backend
  verification:
    - review-qa
    - tester
    - security
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
