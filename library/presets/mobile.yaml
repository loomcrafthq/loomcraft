name: Mobile
description: Mobile application with React Native, full agent pipeline, and cross-platform testing.
agents:
  - database
  - backend
  - frontend
  - ux-ui
  - tester
  - review-qa
  - security
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/linear-conventions
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/testing-patterns
  - loomcraft/skills/react-native-patterns
workflow:
  preparation:
    source: linear
  pipeline:
    - agent: database
      condition: "if migrations needed"
    - agent: tester
      mode: tdd
      scope: "database + backend"
    - agent: backend
    - agent: ux-ui
      condition: "if UI needed"
    - agent: frontend
    - agent: tester
      mode: test-after
      scope: "frontend"
  verification:
    - review-qa
    - tester
    - security
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
