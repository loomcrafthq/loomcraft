name: CLI
description: Command-line tool with robust argument parsing, testing, and security hardening.
agents:
  - backend
  - tester
  - review-qa
  - security
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/testing-patterns
  - loomcraft/skills/cli-development
workflow:
  preparation:
    source: linear
  pipeline:
    - agent: tester
      mode: tdd
      scope: "backend"
    - agent: backend
  verification:
    - review-qa
    - tester
    - security
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
