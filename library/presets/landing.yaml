name: Landing
description: Marketing landing page with SEO, conversion optimization, and responsive design.
agents:
  - frontend
  - ux-ui
  - tester
  - review-qa
skills:
  - loomcraft/skills/brainstorm
  - loomcraft/skills/plan
  - loomcraft/skills/commit-conventions
  - loomcraft/skills/code-review
  - loomcraft/skills/seo-optimization
  - loomcraft/skills/ui-ux-guidelines
  - loomcraft/skills/hero-copywriting
workflow:
  preparation:
    source: manual
  pipeline:
    - agent: ux-ui
    - agent: frontend
    - agent: tester
      mode: test-after
      scope: "frontend"
  verification:
    - review-qa
    - tester
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
