name: Landing
description: Marketing landing page with SEO, conversion optimization, and responsive design.
agents:
  - frontend
  - ux-ui
  - tester
  - review-qa
skills:
  - obra/superpowers/brainstorming
  - obra/superpowers/writing-plans
  - obra/superpowers/executing-plans
  - obra/superpowers/systematic-debugging
  - obra/superpowers/requesting-code-review
  - obra/superpowers/receiving-code-review
  - github/awesome-copilot/conventional-commit
  - loomcrafthq/skills/ticket-craft
  - loomcrafthq/skills/testing-patterns
  - anthropics/skills/frontend-design
  - vercel-labs/agent-skills/web-design-guidelines
  - coreyhaines31/marketingskills/seo-audit
  - coreyhaines31/marketingskills/copywriting
  - wshobson/agents/tailwind-design-system
workflow:
  preparation:
    source: manual
  pipeline:
    - agent: ux-ui
    - agent: frontend
    - agent: tester
      mode: test-after
      scope: "frontend"
  verification:
    - review-qa
    - tester
  finalization:
    commits: conventional
    branch: "feat/<ticket-id>-<description>"
