constitution:
  principles:
    - Ship fast, iterate often — prefer working software over perfect plans
    - User-first design — every feature must solve a real user problem
    - Type safety everywhere — leverage TypeScript strict mode
    - Convention over configuration — follow established patterns
    - Security by default — auth and validation on every boundary
  conventions:
    - Use Server Components by default, Client Components only when needed
    - Server Actions for all mutations
    - Zod validation at API boundaries
    - Mobile-first responsive design
    - Semantic HTML with ARIA attributes for accessibility
context:
  projectDescription: >
    This is a SaaS application built with Next.js, using a multi-agent development pipeline.
    The orchestrator coordinates brainstorming, planning, development, review, and testing phases.
    Each agent follows domain-specific conventions defined in linked skills.
